name: Setup Project Structure

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      
      - name: Create project structure
        run: |
          mkdir -p app/\(auth\)/login
          mkdir -p app/\(auth\)/cadastro
          mkdir -p app/dashboard
          mkdir -p app/planejamento/novo
          mkdir -p app/planejamento/\[id\]
          mkdir -p app/pdi
          mkdir -p app/pagamento
          mkdir -p app/api/gerar-plano
          mkdir -p app/api/auth
          mkdir -p components/Header
          mkdir -p components/PlanejamentoCard
          mkdir -p lib
          mkdir -p public
          
          # app/globals.css
          cat > app/globals.css << 'CSSEOF'
@tailwind base;
@tailwind components;
@tailwind utilities;

:root {
  --foreground-rgb: 0, 0, 0;
  --background-start-rgb: 214, 219, 220;
  --background-end-rgb: 255, 255, 255;
}

body {
  color: rgb(var(--foreground-rgb));
}
CSSEOF

          # app/layout.tsx
          cat > app/layout.tsx << 'TSXEOF'
import type { Metadata } from 'next'
import { Inter } from 'next/font/google'
import './globals.css'

const inter = Inter({ subsets: ['latin'] })

export const metadata: Metadata = {
  title: 'Planeprof - Planejamento de Aulas BNCC',
  description: 'Planejamento de Aulas baseado na BNCC para Educação Infantil e Fundamental',
}

export default function RootLayout({
  children,
}: {
  children: React.ReactNode
}) {
  return (
    <html lang="pt-BR">
      <body className={inter.className}>{children}</body>
    </html>
  )
}
TSXEOF

          # app/page.tsx (landing page)
          cat > app/page.tsx << 'TSXEOF'
